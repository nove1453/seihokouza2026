<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f6f4ee">
  <title>Seiho Study - 保険講座 学習アプリ</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <button class="brand" data-nav="dashboard" aria-label="ホームへ">
        <span class="brand-mark">S</span>
        <span><b>Seiho Study</b><small>保険講座 学習アプリ</small></span>
      </button>
      <div class="topbar-actions">
        <select id="subjectScope" class="subject-scope" aria-label="学習科目"></select>
        <select id="yearScope" class="subject-scope" aria-label="学習年度"></select>
        <select id="formScope" class="subject-scope" aria-label="学習フォーム"></select>
        <button class="icon-button" id="settingsButton" aria-label="データ管理"><span aria-hidden="true">•••</span></button>
      </div>
    </header>

    <main id="app" tabindex="-1"></main>

    <nav class="bottom-nav" aria-label="メインメニュー">
      <button data-nav="dashboard" class="active"><span>⌂</span>ホーム</button>
      <button data-nav="practice"><span>▶</span>演習</button>
      <button data-nav="questions"><span>▤</span>問題一覧</button>
      <button data-nav="categories"><span>◇</span>ジャンル</button>
    </nav>
  </div>

  <dialog id="dataDialog">
    <form method="dialog" class="dialog-card">
      <div class="dialog-head">
        <div><p class="eyebrow">DATA</p><h2>学習データ管理</h2></div>
        <button class="icon-button" value="cancel" aria-label="閉じる">×</button>
      </div>
      <p class="muted">この端末に保存した学習履歴をJSONで持ち運べます。</p>
      <div class="dialog-actions">
        <button type="button" class="primary-button" id="exportButton">履歴をエクスポート</button>
        <label class="secondary-button file-button">履歴をインポート<input type="file" id="importInput" accept="application/json"></label>
        <button type="button" class="danger-button" id="resetButton">履歴をリセット</button>
        <a class="secondary-button admin-link" href="./admin.html">管理者画面を開く →</a>
      </div>
    </form>
  </dialog>

  <div id="toast" role="status" aria-live="polite"></div>
  <script type="module" src="./app.js"></script>
</body>
</html>
